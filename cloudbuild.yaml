# Cloud Build pipeline: GitHub push -> build container -> deploy to Cloud Run.
#
# Triggered by Cloud Build's GitHub integration (configured in GCP console,
# scoped to the cloudrun-migration branch during migration; flip to main
# once Cloud Run is validated).
#
# Image tag includes the commit SHA so every deploy is traceable to an
# exact GitHub commit. Also tags :latest for convenience.

steps:
  # 1. Build the container from the Dockerfile.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan:$COMMIT_SHA
      - --tag=us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan:latest
      - .

  # 2. Push the image to Artifact Registry (GCP's container storage).
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan

  # 3. Deploy to Cloud Run.
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - dan
      - --image=us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan:$COMMIT_SHA
      - --region=us-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=20
      - --concurrency=80
      - --timeout=600s
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,AIRTABLE_TOKEN=AIRTABLE_TOKEN:latest

images:
  - us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan:$COMMIT_SHA
  - us-west1-docker.pkg.dev/$PROJECT_ID/dan/dan:latest

options:
  logging: CLOUD_LOGGING_ONLY
